aid: rabbit-r1
url: https://raw.githubusercontent.com/api-evangelist/rabbit-r1/refs/heads/main/apis.yml
name: Rabbit
kind: company
description: >-
  Rabbit is the maker of the R1, a $199 handheld AI device running rabbitOS
  2.1 with no subscription required. The R1 ships with Magic Recorder
  (unlimited recordings, transcripts, AI summaries), Magic Camera, Magic
  Voice, and DLAM — the Desktop Large Action Model, a plug-and-play controller
  that carries out tasks across the user's computer OS. Rabbit's Large Action
  Model is exposed to users via the LAM Playground on rabbit.tech. Industrial
  design is by Teenage Engineering. Partner integrations (e.g. OpenClaw for
  voice-activated task automation) are user-configured. No public developer
  API or SDK is documented; partner / developer access appears to be gated.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - AI
